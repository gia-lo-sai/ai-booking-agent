# Configurazione hcloud per ai-booking-agent
# Questo file contiene i parametri di default per il deployment

# Nome del progetto
PROJECT_NAME=ai-booking-agent

# Configurazione server
SERVER_NAME=ai-booking-agent
SERVER_TYPE=cx11
SERVER_IMAGE=ubuntu-22.04
DATACENTER=nbg1-dc3

# Network (opzionale)
# NETWORK_NAME=ai-booking-network
# NETWORK_ZONE=eu-central

# Volume per database (opzionale, per persistenza dati)
# VOLUME_NAME=ai-booking-db-volume
# VOLUME_SIZE=10

# Firewall rules
# Le seguenti porte verranno aperte automaticamente:
# - 22 (SSH)
# - 80 (HTTP)
# - 443 (HTTPS) - quando configurato
# - 3001 (API Backend) - opzionale, per debug

# Backup automatici (opzionale)
# ENABLE_BACKUPS=true
# BACKUP_WINDOW=22-02

# Labels per organizzazione
LABEL_PROJECT=ai-booking-agent
LABEL_ENVIRONMENT=production
LABEL_MANAGED_BY=termux-cli

# Configurazione SSH
SSH_KEY_NAME=ai-booking-key

# Context hcloud
HCLOUD_CONTEXT=ai-booking-agent

# Note di deployment
# - Il server viene creato con snapshot Ubuntu 22.04
# - Docker e docker-compose vengono installati automaticamente
# - I servizi partono automaticamente via docker-compose
# - Il database PostgreSQL ha un volume persistente
